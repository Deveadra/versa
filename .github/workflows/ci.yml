name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  node-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Ensure CPU-only PyTorch wheels are selected in CI to avoid CUDA-linked runtime crashes.
          python -m pip install --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple torch
          python -m pip install -e ".[dev]"
      - name: Verify Python dependency surface
        run: |
          python - <<'PY'
          import importlib
          required = [
              'pytest',
              'apscheduler',
              'openai',
              'faiss',
              'qdrant_client',
              'sentence_transformers',
              'spacy',
              'torch',
          ]
          missing = []
          for module in required:
              try:
                  importlib.import_module(module)
              except Exception as exc:
                  missing.append((module, exc))

          if missing:
              for module, exc in missing:
                  print(f"MISSING_OR_BROKEN {module}: {exc}")
              raise SystemExit(1)

          print('Python dependency verification passed')
          PY
      - name: Ruff
        run: python -m ruff check tests scripts
      - name: Black
        run: python -m black --check tests scripts

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Ensure CPU-only PyTorch wheels are selected in CI to avoid CUDA-linked runtime crashes.
          python -m pip install --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple torch
          python -m pip install -e ".[dev]"
      - name: Verify Python dependency surface
        run: |
          python - <<'PY'
          import importlib
          required = [
              'pytest',
              'apscheduler',
              'openai',
              'faiss',
              'qdrant_client',
              'sentence_transformers',
              'spacy',
              'torch',
          ]
          missing = []
          for module in required:
              try:
                  importlib.import_module(module)
              except Exception as exc:
                  missing.append((module, exc))

          if missing:
              for module, exc in missing:
                  print(f"MISSING_OR_BROKEN {module}: {exc}")
              raise SystemExit(1)

          print('Python dependency verification passed')
          PY
      - name: Compile (syntax gate)
        run: python -m compileall -q .
      - name: Pytest
        env:
          OPENAI_API_KEY: sk-test-dummy-key-for-ci
        run: |
          mkdir -p reports/pytest
          python -m pytest -q --junitxml=reports/pytest/junit.xml
      - name: Upload junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ github.run_id }}
          path: reports/pytest/junit.xml
